<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มลงทะเบียน</title>
    <style>h5{ font-size: 70px;
             margin-left: 2600px;}
    </style>
</head>
<body>
    <div class="form-container">
    <h2>แบบฟอร์มลงทะเบียน</h2>
    <form>
        <label for="fname">ชื่อ-นามสกุล:</label><br>
        <input type="text" id="fname" name="fname" placeholder="ใส่ชื่อของคุณที่นี่"><br><br>

        <label for="email">อีเมล:</label><br>
        <input type="email" id="email" name="email" placeholder="example@mail.com"><br><br>

        <label>เพศ:</label><br>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">ชาย</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">หญิง</label><br><br>

        <label for="subject">หัวข้อที่สนใจ:</label><br>
        <select id="subject" name="subject">
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="python">Python</option>
        </select><br><br>

        <input type="submit" value="ส่งข้อมูล">
    </form>
</div>   
<h1>นายปิยะภัทร สีแสง 6812732138</h1>
</body>
</html>
